<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checklist de tareas</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 24px 16px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f4f3ee;
    color: #2c2c2a;
    display: flex;
    justify-content: center;
  }
  .wrap { width: 100%; max-width: 480px; }
  h1 { font-size: 20px; font-weight: 600; margin: 0 0 4px; }
  .sub { font-size: 14px; color: #6b6a63; margin: 0 0 20px; }
  .progress-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
  .progress-label { font-size: 14px; font-weight: 600; }
  .bar { height: 8px; background: #e4e2d8; border-radius: 99px; overflow: hidden; margin-bottom: 24px; }
  .bar-fill { height: 100%; width: 0%; background: #3b6d11; transition: width .25s ease; }
  .item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 14px;
    background: #ffffff;
    border: 1px solid #e4e2d8;
    border-radius: 10px;
    margin-bottom: 8px;
    cursor: pointer;
    user-select: none;
  }
  .item:active { transform: scale(0.99); }
  .box {
    width: 22px;
    height: 22px;
    flex-shrink: 0;
    border-radius: 6px;
    border: 2px solid #b4b2a9;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .box.checked { background: #3b6d11; border-color: #3b6d11; }
  .box svg { display: none; width: 14px; height: 14px; }
  .box.checked svg { display: block; }
  .text { font-size: 15px; line-height: 1.4; }
  .text.done { color: #9a988f; text-decoration: line-through; }
  .footer { font-size: 12px; color: #9a988f; text-align: center; margin-top: 20px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Tareas</h1>
  <p class="sub">Tildá lo que ya está hecho. Se guarda para todos.</p>
  <div class="progress-row">
    <span class="sub" style="margin:0;">Progreso</span>
    <span class="progress-label" id="progress-label">0 / 9</span>
  </div>
  <div class="bar"><div class="bar-fill" id="bar-fill"></div></div>
  <div id="list"></div>
  <p class="footer">Los cambios se guardan automáticamente</p>
</div>

<script>
const items = [
  "Pedir turno neuróloga",
  "Llevar CUD a PAMI",
  "Hablar con papá para que Eli vaya todos los días",
  "Comprar el AirTag",
  "Ver alquiler con Gabriel",
  "Preguntar a la mujer que organiza cómo es la internación",
  "Comprar antena TDA",
  "Contratar Telecom (línea común)",
  "Dar de baja Telecentro"
];
const KEY = "tareas-familia-v1";
let state = {};

async function load() {
  try {
    const res = await window.storage.get(KEY, true);
    state = res ? JSON.parse(res.value) : {};
  } catch (e) { state = {}; }
  render();
}

async function save() {
  try { await window.storage.set(KEY, JSON.stringify(state), true); } catch(e) {}
}

function render() {
  const list = document.getElementById('list');
  list.innerHTML = '';
  let done = 0;
  items.forEach((text, i) => {
    const checked = !!state[i];
    if (checked) done++;
    const row = document.createElement('div');
    row.className = 'item';
    row.onclick = () => toggle(i);
    row.innerHTML = `
      <div class="box ${checked ? 'checked' : ''}">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
      </div>
      <span class="text ${checked ? 'done' : ''}">${text}</span>
    `;
    list.appendChild(row);
  });
  document.getElementById('progress-label').textContent = `${done} / ${items.length}`;
  document.getElementById('bar-fill').style.width = `${(done/items.length)*100}%`;
}

function toggle(i) {
  state[i] = !state[i];
  render();
  save();
}

load();
</script>
</body>
</html>
